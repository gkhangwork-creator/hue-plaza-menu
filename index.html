<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hue Plaza Menu</title>

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#page{
max-width:100%;
max-height:100vh;
object-fit:contain;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<img id="page" src="0.jpg">

<div class="controls">
<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>
</div>

<script>

const pages = [
"0.jpg",
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.jpg",
"9.jpg",
"10.jpg",
"11.jpg"
];

let current = 0;

function showPage(){
document.getElementById("page").src = pages[current];
}

function nextPage(){
if(current < pages.length - 1){
current++;
showPage();
}
}

function prevPage(){
if(current > 0){
current--;
showPage();
}
}

</script>

</body>
</html>
